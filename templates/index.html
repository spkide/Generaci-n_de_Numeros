<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneShield — Generador de Números</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0d1318;
    --card: #111820;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #00ff9d;
    --warn: #ff6b35;
    --text: #c8d8e8;
    --muted: #4a6070;
    --glow: rgba(0,229,255,0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.6; }
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,229,255,0.08);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-badge::before {
    content: '●';
    color: var(--accent2);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CONTROLS */
  .controls {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  select, input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    cursor: pointer;
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .btn-row {
    display: flex;
    gap: 12px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::after { opacity: 0.08; }

  .btn-primary {
    background: var(--accent);
    color: #040810;
  }

  .btn-primary:hover {
    background: #33ecff;
    box-shadow: 0 0 24px rgba(0,229,255,0.35);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--glow);
  }

  /* SINGLE NUMBER DISPLAY */
  .number-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.4s ease both;
    transition: border-color 0.3s;
  }

  .number-hero.has-number { border-color: rgba(0,229,255,0.3); }

  .number-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .number-display {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 2px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s;
  }

  .number-display.empty { color: var(--muted); font-size: 1rem; }

  .copy-btn {
    margin-top: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .copy-btn:hover { border-color: var(--accent); background: var(--glow); }
  .copy-btn.copied { color: var(--accent2); border-color: var(--accent2); }

  /* BULK LIST */
  .bulk-section {
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .bulk-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .bulk-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: color 0.2s;
    letter-spacing: 1px;
  }

  .clear-btn:hover { color: var(--warn); }

  .number-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .number-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: slideIn 0.25s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .number-item:last-child { border-bottom: none; }
  .number-item:hover { background: rgba(0,229,255,0.04); }

  .num-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .num-index {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-right: 16px;
  }

  .item-copy {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .item-copy:hover { color: var(--accent); border-color: var(--accent); }
  .item-copy.copied { color: var(--accent2); border-color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .empty-state span { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.4; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: #040810;
    padding: 10px 24px;
    border-radius: 999px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SPINNER */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,229,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: inline-block; }

  /* RESPONSIVE */
  @media (max-width: 540px) {
    .controls-grid { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; }
    .number-display { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-badge">PHONESHIELD v1.0</div>
    <h1>Genera tu<br><span>número privado</span></h1>
    <p class="subtitle">Protege tu privacidad con números de teléfono aleatorios</p>
  </header>

  <!-- CONTROLES -->
  <div class="controls">
    <div class="controls-grid">
      <div>
        <label>País / Región</label>
        <select id="country">
          {% for country in countries %}
          <option value="{{ country }}">{{ country }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Cantidad (máx 50)</label>
        <input type="number" id="count" value="1" min="1" max="50">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateSingle()">⚡ Generar uno</button>
      <button class="btn btn-secondary" onclick="generateBulk()">📋 Generar lista</button>
    </div>
  </div>

  <!-- NÚMERO ÚNICO -->
  <div class="number-hero" id="heroCard">
    <div class="number-label">número generado</div>
    <div class="number-display empty" id="singleNumber">
      <span class="spinner"></span>
      <span id="singleText">Presiona "Generar uno"</span>
    </div>
    <button class="copy-btn" id="copyHeroBtn" onclick="copyHero()" style="display:none">
      COPIAR NÚMERO
    </button>
  </div>

  <!-- LISTA BULK -->
  <div class="bulk-section">
    <div class="bulk-header">
      <span class="bulk-title" id="listTitle">lista de números</span>
      <button class="clear-btn" onclick="clearList()">LIMPIAR LISTA</button>
    </div>
    <div class="number-list" id="numberList">
      <div class="empty-state">
        <span>📱</span>
        Usa "Generar lista" para crear múltiples números
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">¡Copiado al portapapeles!</div>

<script>
  let currentNumber = '';

  function setLoading(el, on) {
    if (on) el.classList.add('loading');
    else el.classList.remove('loading');
  }

  async function generateSingle() {
    const country = document.getElementById('country').value;
    const hero = document.getElementById('singleNumber');
    const text = document.getElementById('singleText');
    const btn = document.getElementById('copyHeroBtn');
    const card = document.getElementById('heroCard');

    hero.classList.remove('empty');
    text.textContent = '...';
    setLoading(hero, true);
    btn.style.display = 'none';

    try {
      const res = await fetch(`/generate/${encodeURIComponent(country)}`);
      const data = await res.json();
      currentNumber = data.number;
      text.textContent = data.number;
      hero.classList.remove('empty');
      card.classList.add('has-number');
      btn.style.display = 'inline-block';
      btn.textContent = 'COPIAR NÚMERO';
      btn.classList.remove('copied');
    } catch (e) {
      text.textContent = 'Error al generar';
      hero.classList.add('empty');
    } finally {
      setLoading(hero, false);
    }
  }

  async function generateBulk() {
    const country = document.getElementById('country').value;
    const count = Math.min(50, Math.max(1, parseInt(document.getElementById('count').value) || 1));
    const list = document.getElementById('numberList');
    const title = document.getElementById('listTitle');

    list.innerHTML = '<div class="empty-state"><span>⏳</span>Generando números...</div>';

    try {
      const res = await fetch(`/generate_bulk/${encodeURIComponent(country)}/${count}`);
      const data = await res.json();
      title.textContent = `${data.numbers.length} números — ${country}`;

      list.innerHTML = '';
      data.numbers.forEach((num, i) => {
        const item = document.createElement('div');
        item.className = 'number-item';
        item.style.animationDelay = `${i * 30}ms`;
        item.innerHTML = `
          <div style="display:flex;align-items:center">
            <span class="num-index">${String(i + 1).padStart(2, '0')}</span>
            <span class="num-text">${num}</span>
          </div>
          <button class="item-copy" onclick="copyItem(this, '${num}')">COPIAR</button>
        `;
        list.appendChild(item);
      });
    } catch (e) {
      list.innerHTML = '<div class="empty-state"><span>❌</span>Error al generar</div>';
    }
  }

  function copyHero() {
    if (!currentNumber) return;
    navigator.clipboard.writeText(currentNumber).then(() => {
      const btn = document.getElementById('copyHeroBtn');
      btn.textContent = '✓ COPIADO';
      btn.classList.add('copied');
      showToast();
      setTimeout(() => {
        btn.textContent = 'COPIAR NÚMERO';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function copyItem(btn, number) {
    navigator.clipboard.writeText(number).then(() => {
      btn.textContent = '✓ OK';
      btn.classList.add('copied');
      showToast();
      setTimeout(() => {
        btn.textContent = 'COPIAR';
        btn.classList.remove('copied');
      }, 1800);
    });
  }

  function clearList() {
    document.getElementById('numberList').innerHTML = `
      <div class="empty-state">
        <span>📱</span>
        Usa "Generar lista" para crear múltiples números
      </div>`;
    document.getElementById('listTitle').textContent = 'lista de números';
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
